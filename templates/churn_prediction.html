<form method="post">
    CIBIL Score: <input name="CIBIL_Score" required><br>
    Age: <input name="Age" required><br>
    Tenure: <input name="Tenure" required><br>
    Account Balance: <input name="Account_Balance" required><br>
    Products: <input name="NumOfProducts" required><br>
    Credit Card (1/0): <input name="HasCrCard" required><br>
    Digital Active (1/0): <input name="Digital_Active" required><br>
    Monthly Income: <input name="Monthly_Income" required><br>

    Geography:
    <select name="Geography">
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
    </select><br>

    Gender:
    <select name="Gender">
        <option>Male</option>
        <option>Female</option>
    </select><br>

    <button type="submit">Predict</button>
</form>
