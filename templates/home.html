<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intelligent Customer Retention Assistant Using Explainable 
        AI and Behavior-Aware Churn Analytics </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url("/static/background.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        a {
            text-decoration: none;
            padding: 14px 30px;
            background: #00c6ff;
            color: #000;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
        }

        a:hover {
            background: #ffffff;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Intelligent Customer Retention Assistant</h1>
        <p>AI-Driven Churn Prediction & Retention Strategy System</p>
        <a href="/predict">Start Prediction</a>
        <a href="/loan-chatbot">Loan Chatbot</a>

    </div>

</body>
</html>
