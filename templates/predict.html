<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Churn Prediction</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                url("/static/background.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            padding: 35px 45px;
            width: 420px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
            opacity: 0.9;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #00c6ff;
            color: #000;
            font-weight: bold;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffffff;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .churn {
            color: #ff6b6b;
        }

        .retain {
            color: #4cd137;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #ddd;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            color: #fff;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Customer Churn Prediction</h2>

    <form method="post">

        <label>CIBIL Score</label>
        <input type="number" name="CIBIL_Score" required>

        <label>Age</label>
        <input type="number" name="Age" required>

        <label>Tenure (Years)</label>
        <input type="number" name="Tenure" required>

        <label>Account Balance</label>
        <input type="number" step="0.01" name="Account_Balance" required>

        <label>Number of Products</label>
        <input type="number" name="NumOfProducts" required>

        <label>Has Credit Card (1 = Yes, 0 = No)</label>
        <input type="number" name="HasCrCard" min="0" max="1" required>

        <label>Digital Active (1 = Yes, 0 = No)</label>
        <input type="number" name="Digital_Active" min="0" max="1" required>

        <label>Monthly Income</label>
        <input type="number" step="0.01" name="Monthly_Income" required>

        <label>Geography</label>
        <select name="Geography">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select>

        <label>Gender</label>
        <select name="Gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            {% if prediction == 1 %}
                <span class="churn">⚠ Customer Likely to Churn</span>
            {% else %}
                <span class="retain">✅ Customer Likely to Stay</span>
            {% endif %}
        </div>
    {% endif %}

    <a href="/">← Back to Home</a>
</div>

</body>
</html>
